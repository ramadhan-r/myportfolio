<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Is Good</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: url('https://i.ibb.co/2tF3h5Q/lifeorg.jpg') no-repeat center/cover;
}

/* AUTH */
.auth-container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: rgba(255,255,255,0.95);
  padding: 30px;
  width: 360px;
  border-radius: 15px;
  box-shadow: 0 15px 50px rgba(0,0,0,0.3);
  text-align: center;
  position: relative;
  animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(-20px);}
  to {opacity:1; transform: translateY(0);}
}

.chat-tip {
  position: absolute;
  top: -80px;
  left: -10px;
  background: #000;
  color: #fff;
  padding: 12px;
  border-radius: 10px;
  font-size: 13px;
  width: 240px;
}

.chat-tip::after {
  content: "";
  position: absolute;
  bottom: -10px;
  left: 30px;
  border-width: 10px;
  border-style: solid;
  border-color: #000 transparent transparent transparent;
}

.logo {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 15px;
}

button {
  width: 100%;
  padding: 14px;
  background: #007bff;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  transition: background 0.3s;
}

button:hover {
  background: #0056b3;
}

.switch {
  margin-top: 12px;
  font-size: 14px;
  color: #007bff;
  cursor: pointer;
}

/* DASHBOARD */
.dashboard {
  display: none;
  background: #f4f6f9;
  min-height: 100vh;
}

/* NAV */
.navbar {
  background: #007bff;
  color: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  align-items: center;
}

.navbar strong {
  font-size: 22px;
}

.nav-links span {
  margin: 0 12px;
  cursor: pointer;
  font-size: 15px;
}

.nav-links span:hover {
  text-decoration: underline;
}

/* CONTENT */
.content {
  padding: 25px;
}

/* STATS */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(180px,1fr));
  gap: 20px;
  margin-bottom: 25px;
}

.stat {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.05);
  font-size: 16px;
  text-align: center;
}

.stat strong {
  display: block;
  font-size: 22px;
  margin-top: 8px;
  color: #007bff;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 25px;
}

.box {
  background: #fff;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.05);
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 15px;
}

td, th {
  padding: 12px 10px;
  border-bottom: 1px solid #ddd;
  text-align: left;
}

th {
  background: #007bff;
  color: white;
  font-weight: 600;
}

/* MEMBERS */
.member {
  padding: 10px 0;
  border-bottom: 1px solid #eee;
  display: flex;
  justify-content: space-between;
  font-size: 15px;
}

.member strong {
  color: #007bff;
}

/* MOBILE */
@media(max-width:768px){
  .grid {
    grid-template-columns: 1fr;
  }

  .navbar {
    flex-direction: column;
    gap: 10px;
  }

  .card {
    width: 95%;
  }
}

/* SCROLL */
.members-container {
  max-height: 400px;
  overflow-y: auto;
  margin-top: 10px;
  border-radius: 10px;
  background: #fff;
  padding: 10px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
}

.members-container::-webkit-scrollbar {
  width: 8px;
}

.members-container::-webkit-scrollbar-thumb {
  background-color: #007bff;
  border-radius: 4px;
}

</style>
</head>

<body>

<!-- AUTH -->
<div class="auth-container" id="auth">
  <div class="card">
    <div class="chat-tip">
      👋 Demo: Enter any email & password.
    </div>
    <div class="logo">Life Is Good</div>
    <h3 id="formTitle">Login</h3>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button onclick="enterApp()">Continue</button>
    <div class="switch" onclick="toggleForm()">Switch to Signup</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <div class="navbar">
    <div><strong>Life Is Good</strong></div>
    <div class="nav-links">
      <span onclick="showPage('dashboardPage')">Dashboard</span>
      <span onclick="showPage('membersPage')">Members</span>
      <span onclick="showPage('recordsPage')">Records</span>
      <span>👤 Account</span>
    </div>
  </div>

  <div class="content">

    <!-- DASHBOARD PAGE -->
    <div id="dashboardPage">

      <div class="stats">
        <div class="stat">Total Donations<br><strong>$12,450</strong></div>
        <div class="stat">📉 Total Expenses<br><strong>$4,800</strong></div>
        <div class="stat">👥 Members<br><strong>23</strong></div>
        <div class="stat">📈 Growth<br><strong>+27%</strong></div>
      </div>

      <div class="grid">
        <div class="box">
          <h3>Donations Trend</h3>
          <canvas id="donationChart"></canvas>
        </div>

        <div class="box">
          <h3>Expenses Overview</h3>
          <canvas id="expenseChart"></canvas>
        </div>
      </div>
<div class="box">
  <h3>Upcoming Tasks</h3>
  <div id="tasksContainer"></div>
</div>
    </div>

    <!-- MEMBERS -->
    <div id="membersPage" style="display:none;">
      <div class="box">
        <h3>Members List</h3>
        <div class="members-container" id="membersList"></div>
      </div>
    </div>

    <!-- RECORDS -->
    <div id="recordsPage" style="display:none;">
      <div class="box">
        <h3>Financial Records</h3>
     
        <div class="members-container" id="recordsList"></div>
      </div>
    </div>

  </div>

</div>

<script>

let isLogin = true;

function toggleForm(){
  isLogin = !isLogin;
  document.getElementById("formTitle").innerText = isLogin ? "Login" : "Signup";
}

/* ENTER */
function enterApp(){
  document.getElementById("auth").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  loadCharts();
  loadMembers();
  loadRecords();
}

/* NAVIGATION */
function showPage(page){
  document.getElementById("dashboardPage").style.display = "none";
  document.getElementById("membersPage").style.display = "none";
  document.getElementById("recordsPage").style.display = "none";
  document.getElementById(page).style.display = "block";
}

/* MEMBERS */
function loadMembers(){
  const members = [
    ["John Kamau","Director"],
    ["Amina Yusuf","Coordinator"],
    ["David Otieno","Treasurer"],
    ["Grace Wanjiku","Member"],
    ["Brian Mwangi","Member"],
    ["Faith Njeri","Member"],
    ["Peter Kiptoo","Member"],
    ["Mary Atieno","Member"],
    ["James Kariuki","Member"],
    ["Mercy Chebet","Member"],
    ["Alice Naliaka","Member"],
    ["Benard Kiprotich","Member"],
    ["Catherine Wanja","Member"],
    ["Daniel Kimani","Member"],
    ["Esther Wambui","Member"],
    ["Fredrick Njenga","Member"],
    ["Gloria Mwikali","Member"],
    ["Hassan Omar","Member"],
    ["Irene Mutua","Member"],
    ["James Maina","Member"],
    ["Kelvin Ouma","Member"],
    ["Lydia Muthoni","Member"]
  ];

  const container = document.getElementById("membersList");
  container.innerHTML = "";
  members.forEach(m=>{
    const div = document.createElement("div");
    div.className = "member";
    div.innerHTML = `<strong>${m[0]}</strong> <span>${m[1]}</span>`;
    container.appendChild(div);
  });
}

/* RECORDS */
function loadRecords(){
  const records = [
    ["1. John Kamau","Donation","$500"],
    ["2. Amina Yusuf","Expense","$200"],
    ["3. David Otieno","Donation","$800"],
    ["4. Grace Wanjiku","Donation","$300"],
    ["5. Brian Mwangi","Expense","$150"],
    ["6. Faith Njeri","Donation","$450"],
    ["7. Peter Kiptoo","Expense","$250"],
    ["8. Mary Atieno","Donation","$700"],
    ["9. James Kariuki","Expense","$100"],
    ["10. Mercy Chebet","Donation","$600"],
    ["11. Alice Naliaka","Donation","$350"],
    ["12. Benard Kiprotich","Expense","$200"],
    ["13. Catherine Wanja","Donation","$400"],
    ["14. Daniel Kimani","Donation","$550"],
    ["15. Esther Wambui","Expense","$300"],
    ["16. Fredrick Njenga","Donation","$650"],
    ["17. Gloria Mwikali","Expense","$150"],
    ["18. Hassan Omar","Donation","$500"],
    ["19. Irene Mutua","Expense","$100"],
    ["20. James Maina","Donation","$450"],
    ["21. Kelvin Ouma","Expense","$200"],
    ["22. Lydia Muthoni","Donation","$600"]
  ];

  const container = document.getElementById("recordsList");
  container.innerHTML = "<table><tr><th>Name</th><th>Type</th><th>Amount</th></tr></table>";
  const table = document.createElement("table");
  records.forEach(r=>{
    const row = document.createElement("tr");
    row.innerHTML = `<td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td>`;
    table.appendChild(row);
  });
  container.appendChild(table);
}

/* CHARTS */
function loadCharts(){
  new Chart(document.getElementById("donationChart"), {
    type: 'line',
    data: {
      labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug'],
      datasets: [{
        label: 'Donations ($)',
        data: [500,1200,800,1500,900,1100,1250,1400],
        borderColor: '#007bff',
        backgroundColor: 'rgba(0,123,255,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius:4
      }]
    },
    options: {responsive:true, plugins:{legend:{display:true}}}
  });

  new Chart(document.getElementById("expenseChart"), {
    type: 'bar',
    data: {
      labels: ['Food','Transport','Medical','Education','Others'],
      datasets: [{
        label: 'Expenses ($)',
        data: [300,200,400,250,150],
        backgroundColor: '#dc3545'
      }]
    },
    options: {responsive:true, plugins:{legend:{display:true}}}
  });
}
function loadTasks(){
  const tasks = [
    {name:"Annual Meeting", date:"2026-03-25T10:00:00"},
    {name:"Project Submission", date:"2026-03-20T15:00:00"},
    {name:"Volunteer Event", date:"2026-03-22T09:00:00"},
    {name:"Fundraiser Launch", date:"2026-03-28T12:00:00"}
  ];

  const container = document.getElementById("tasksContainer");
  container.innerHTML = "";

  tasks.forEach((task, i) => {
    const div = document.createElement("div");
    div.className = "task";
    div.id = "task-" + i;
    div.innerHTML = `<span>${task.name}</span> <span id="countdown-${i}"></span>`;
    container.appendChild(div);

    function updateCountdown(){
      const now = new Date().getTime();
      const taskTime = new Date(task.date).getTime();
      const distance = taskTime - now;

      if(distance < 0){
        document.getElementById(`countdown-${i}`).innerText = "Started";
        clearInterval(interval);
        return;
      }

      const days = Math.floor(distance / (1000*60*60*24));
      const hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
      const minutes = Math.floor((distance % (1000*60*60))/(1000*60));
      const seconds = Math.floor((distance % (1000*60))/1000);

      document.getElementById(`countdown-${i}`).innerText = `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    updateCountdown();
    const interval = setInterval(updateCountdown, 1000);
  });
}
</script>

</body>
</html>
