<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FirmSys Dashboard</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* RESET & BASE */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
body { display:flex; min-height:100vh; background:#f0f2f5; }

/* SIDEBAR */
.sidebar {
  width:220px;
  background:linear-gradient(180deg,#1f2a38,#34495e);
  color:#fff;
  padding:30px 20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.sidebar h2 {
  font-size:26px;
  font-weight:700;
  margin-bottom:40px;
  background:linear-gradient(90deg,#22d3ee,#3b82f6,#ff3d00,#ffea00);
  -webkit-background-clip:text;
  color:transparent;
}
.sidebar p {
  margin:15px 0;
  cursor:pointer;
  padding:8px 12px;
  border-radius:8px;
  transition:0.3s;
}
.sidebar p:hover { background:rgba(255,255,255,0.1); }

/* MAIN CONTENT */
.main {
  flex:1;
  padding:40px;
  display:flex;
  flex-direction:column;
}
.main h1 {
  font-size:36px;
  margin-bottom:30px;
  color:#2c3e50;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  padding:30px 25px;
  margin-bottom:25px;
  border-radius:15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
  overflow:hidden;
}
.card:hover {
  transform: translateY(-8px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}
.card::before {
  content:"";
  position:absolute;
  width:150%;
  height:150%;
  background:linear-gradient(45deg, #22d3ee,#3b82f6,#ff3d00,#ffea00);
  top:-50%; left:-50%;
  filter: blur(100px);
  opacity:0.3;
  z-index:0;
}

/* CARD CONTENT */
.card span {
  position:relative;
  font-size:22px;
  font-weight:700;
  z-index:1;
  color:#fff;
}

/* RESPONSIVE */
@media(max-width:900px){
  body { flex-direction:column; }
  .sidebar { width:100%; height:auto; flex-direction:row; justify-content:space-around; padding:15px; }
  .main { padding:20px; }
}

</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>FirmSys</h2>
  <div>
    <p>Dashboard</p>
    <p>Projects</p>
    <p>Reports</p>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <h1>Dashboard</h1>
  <div class="card"><span>Active Projects: 12</span></div>
  <div class="card"><span>Clients: 8</span></div>
  <div class="card"><span>Revenue: $48,000</span></div>
  <div class="card"><span>Pending Tasks: 5</span></div>
</div>

</body>
</html>
