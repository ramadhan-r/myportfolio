<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact & Services | Rioba Mwita</title>
<link rel="icon" href="images/favicon.png" type="image/png">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Header / Navigation -->
<header>
    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/portfolio">Portfolio</a></li>
            <li><a href="/services.html" class="active">Contact</a></li>
            <li><a href="/contact">Support Me</a></li>
        </ul>
    </nav>
</header>

<!-- Service Order Form -->
<section class="services-order">
    <h1>Request Services</h1>
    <p>Use the form below to request services or submit an enquiry.</p>

    <form id="serviceOrderForm">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="John Doe" required>

        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>

        <label for="phone">WhatsApp Number (optional for faster response):</label>
        <input type="text" id="phone" name="phone" placeholder="07XXXXXXXX or 01XXXXXXXX">

        <label for="service">Service (optional if just asking a question):</label>
        <select id="service" name="service">
            <option value="">--Select Service--</option>
            <option value="GIS Mapping">GIS Mapping</option>
            <option value="Environmental Research">Research Assistance</option>
            <option value="Web Development">Web Development</option>
            <option value="Land Surveying">Land Surveying</option>
            <option value="Other">Other</option>
        </select>

        <label for="details">Project Details / Question:</label>
        <textarea id="details" name="details" rows="4" placeholder="Briefly describe your project or question..." required></textarea>

        <div class="enquiry-checkbox">
            <input type="checkbox" id="justQuestion" name="justQuestion">
            <label for="justQuestion">This is a question / enquiry</label>
        </div>

        <p id="formMessage" style="color:#aee108; text-align:center; display:none;"></p>

        <button type="submit">Submit</button>
    </form>
</section>

<!-- Contact / Socials Section -->
<section class="contact">
    <h3>Or Reach Me Directly Through;</h3>

    <div class="contact-socials">
        <a href="mailto:riobaramadhan@gmail.com" target="_blank">
            <img src="images/gmail.png" alt="Email">
        </a>
        <a href="https://wa.me/254729709807" target="_blank">
            <img src="images/whatsapp.png" alt="WhatsApp">
        </a>
        <a href="https://www.linkedin.com/in/rioba-mwita-026019233" target="_blank">
            <img src="images/linkedin.png" alt="LinkedIn">
        </a>
    </div>

    <div class="contact-location">
        <img src="images/location.png" alt="Location">
        <span>Muthaiga, Nairobi</span>
    </div>
</section>

<!-- Footer -->
<footer>
    <p>&copy; 2025 Rioba Mwita | All rights reserved</p>
</footer>

<!-- JS -->
<script>
document.getElementById('serviceOrderForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const serviceSelect = document.getElementById('service');
    const service = serviceSelect.value || 'General Enquiry';
    const details = document.getElementById('details').value.trim();
    const justQuestion = document.getElementById('justQuestion').checked;

    const typeText = justQuestion ? 'Enquiry' : 'Service Request';
    const message = `Hi Rioba, I have a ${typeText}.\n\nName: ${name}\nEmail: ${email}\nPhone: ${phone || 'N/A'}\nService/Question: ${service}\nDetails: ${details}`;

    if(phone.match(/^(07|01)\d{8}$/)) {
        const waLink = `https://wa.me/254729709807?text=${encodeURIComponent(message)}`;
        window.open(waLink, '_blank');
    } else {
        const mailtoLink = `mailto:riobaramadhan@gmail.com?subject=${encodeURIComponent(typeText)}&body=${encodeURIComponent(message)}`;
        window.location.href = mailtoLink;
    }

    this.reset();
});
</script>
<!-- Contact Tooltip -->
<div id="contactTooltip">Click to reach Rioba</div>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const tooltip = document.getElementById("contactTooltip");
    const contactSection = document.querySelector(".contact");
    let shown = false;

    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if (entry.isIntersecting && !shown) {
                shown = true;
                tooltip.style.visibility = "visible";
                tooltip.style.opacity = "1";

                setTimeout(() => {
                    tooltip.style.opacity = "0";
                    tooltip.style.visibility = "hidden";
                }, 2000);
            }
        });
    }, { threshold: 0.6 });

    observer.observe(contactSection);
});
</script>

</body>
</html>
